<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

<meta property="og:url" content="https://yourdomain.com" />

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image" />

<!-- Favicon -->
<link rel="icon" href="favicon.ico" />
  <title>Ultimate Date Tool + Chart</title>  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      margin-bottom: 15px;
    }

    label {
      font-size: 12px;
      color: var(--muted);
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 10px;
      border: none;
    }

    button {
      background: var(--accent);
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .error {
      display: none;
      background: rgba(239,68,68,0.1);
      color: var(--danger);
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      margin-top: 10px;
    }

    .result {
      display: none;
      margin-top: 15px;
    }

    .big {
      font-size: 36px;
      text-align: center;
      font-weight: bold;
    }

    .muted {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 15px;
    }

    .card {
      background: #0f172a;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
    }

    canvas {
      margin-top: 20px;
    }
  </style></head><body><div class="app">
  <h1>Date Tool</h1><label>Start Date</label> <input type="date" id="start">

<label>End Date</label> <input type="date" id="end">

  <div class="row">
    <button onclick="swapDates()">Swap</button>
    <button onclick="setToday()">Today</button>
  </div><button onclick="calculate()">Calculate</button>

  <div class="error" id="error"></div>  <div class="result" id="result">
    <div class="big" id="days"></div>
    <div class="muted">days</div><div class="grid">
  <div class="card"><div id="weeks"></div><div class="muted">weeks</div></div>
  <div class="card"><div id="months"></div><div class="muted">months</div></div>
  <div class="card"><div id="years"></div><div class="muted">years</div></div>
</div>

<canvas id="chart"></canvas>

  </div>
</div><script>
let chart;

const startEl = document.getElementById('start');
const endEl = document.getElementById('end');
const errorEl = document.getElementById('error');
const resultEl = document.getElementById('result');

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.style.display = 'block';
  resultEl.style.display = 'none';
}

function calculate() {
  errorEl.style.display = 'none';

  if (!startEl.value || !endEl.value) {
    showError('Fill both dates bro 😅');
    return;
  }

  const start = new Date(startEl.value);
  const end = new Date(endEl.value);

  if (end < start) {
    showError('End date must be after start 😤');
    return;
  }

  const diff = end - start;

  const days = Math.floor(diff / 86400000);
  const weeks = Math.floor(days / 7);
  const months = Math.floor(days / 30);
  const years = Math.floor(days / 365);

  document.getElementById('days').textContent = days.toLocaleString();
  document.getElementById('weeks').textContent = weeks.toLocaleString();
  document.getElementById('months').textContent = months.toLocaleString();
  document.getElementById('years').textContent = years.toLocaleString();

  resultEl.style.display = 'block';

  updateChart(days, weeks, months, years);
}

function updateChart(days, weeks, months, years) {
  if (chart) chart.destroy();

  chart = new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: {
      labels: ['Days', 'Weeks', 'Months', 'Years'],
      datasets: [{
        data: [days, weeks, months, years],
        backgroundColor: ['#38bdf8', '#22c55e', '#f97316', '#a78bfa']
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true }
      }
    }
  });
}

function swapDates() {
  [startEl.value, endEl.value] = [endEl.value, startEl.value];
}

function setToday() {
  startEl.value = new Date().toISOString().split('T')[0];
}
</script></body>
</html>
