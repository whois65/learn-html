<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Schedule</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1E2130;
            --ink-2: #262A3D;
            --ink-3: #30354B;
            --line: #3A4059;
            --text: #EDEEF2;
            --text-dim: #9CA3BC;
            --gold: #E8A94B;
            --teal: #4FB8A6;
            --violet: #8E7CC3;
            --coral: #D97C6D;
            --slate: #7C8798;
            --good: #6FCF97;
            --radius: 14px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
        }

        body {
            background:
                radial-gradient(1100px 600px at 85% -10%, rgba(232, 169, 75, 0.08), transparent 60%),
                radial-gradient(900px 500px at -10% 110%, rgba(79, 184, 166, 0.08), transparent 60%),
                var(--ink);
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            min-height: 100vh;
            padding: 28px 18px 60px;
        }

        .wrap {
            max-width: 960px;
            margin: 0 auto;
        }

        /* ===== Header / departure-board hero ===== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 22px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--line);
        }

        h1 {
            margin: 0;
            font-size: clamp(24px, 4vw, 34px);
            font-weight: 800;
            letter-spacing: -0.01em;
        }

        .clock-box {
            font-family: 'JetBrains Mono', monospace;
            text-align: right;
        }

        .clock-time {
            font-size: clamp(28px, 5vw, 40px);
            font-weight: 700;
            color: var(--gold);
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .clock-date {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* ===== Now playing strip ===== */
        .now-strip {
            background: var(--ink-2);
            border: 1px solid var(--line);
            border-left: 4px solid var(--gold);
            border-radius: var(--radius);
            padding: 16px 18px;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .now-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 0 4px rgba(232, 169, 75, 0.18);
            animation: pulse 2s infinite ease-in-out;
            flex: none;
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 0 0 4px rgba(232, 169, 75, 0.18);
            }

            50% {
                box-shadow: 0 0 0 8px rgba(232, 169, 75, 0.05);
            }
        }

        .now-strip .label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .now-strip .activity {
            font-size: 17px;
            font-weight: 700;
        }

        .now-strip .countdown {
            margin-left: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-dim);
        }

        .now-strip .countdown b {
            color: var(--teal);
        }

        /* ===== Day tabs ===== */
        .tabs {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 4px;
            margin-bottom: 18px;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab {
            font-family: 'JetBrains Mono', monospace;
            flex: none;
            background: transparent;
            border: 1px solid var(--line);
            color: var(--text-dim);
            padding: 9px 14px;
            border-radius: 999px;
            font-size: 12.5px;
            letter-spacing: .03em;
            cursor: pointer;
            transition: all .15s ease;
        }

        .tab:hover {
            border-color: var(--slate);
            color: var(--text);
        }

        .tab.active {
            background: var(--gold);
            color: #1E2130;
            border-color: var(--gold);
            font-weight: 700;
        }

        .tab.is-today:not(.active)::after {
            content: '•';
            color: var(--teal);
            margin-left: 5px;
        }

        /* ===== Progress ===== */
        .progress-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .progress-track {
            flex: 1;
            height: 8px;
            background: var(--ink-3);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--teal), var(--gold));
            transition: width .35s ease;
        }

        .progress-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-dim);
            flex: none;
        }

        /* ===== Timeline (ledger rows) ===== */
        .day-panel {
            display: none;
        }

        .day-panel.active {
            display: block;
        }

        .day-title {
            font-size: 19px;
            font-weight: 800;
            margin: 0 0 4px;
        }

        .day-sub {
            color: var(--text-dim);
            font-size: 13px;
            margin: 0 0 16px;
        }

        .ledger {
            background: var(--ink-2);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .row {
            display: grid;
            grid-template-columns: 20px 108px 4px 1fr 34px;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--line);
            transition: background .15s ease;
        }

        .row:last-child {
            border-bottom: none;
        }

        .row:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .row.done {
            opacity: .45;
        }

        .row.now-row {
            background: rgba(232, 169, 75, 0.07);
        }

        .chk {
            width: 18px;
            height: 18px;
            border-radius: 5px;
            border: 1.5px solid var(--slate);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: transparent;
            font-size: 12px;
            color: var(--ink);
            flex: none;
        }

        .row.done .chk {
            background: var(--good);
            border-color: var(--good);
        }

        .row .time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12.5px;
            color: var(--text-dim);
            font-variant-numeric: tabular-nums;
        }

        .cat-bar {
            width: 4px;
            height: 26px;
            border-radius: 3px;
            background: var(--slate);
        }

        .row .activity-name {
            font-size: 14.5px;
            font-weight: 600;
            text-decoration: none;
        }

        .row.done .activity-name {
            text-decoration: line-through;
        }

        .row .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-align: right;
            color: var(--text-dim);
        }

        /* category colors */
        .cat-school {
            background: var(--teal);
        }

        .cat-hsk {
            background: var(--gold);
        }

        .cat-code {
            background: var(--violet);
        }

        .cat-project {
            background: var(--coral);
        }

        .cat-life {
            background: var(--slate);
        }

        /* ===== Legend ===== */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin: 18px 2px 0;
        }

        .legend .item {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 12px;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
        }

        .legend .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
        }

        /* ===== Week heatmap ===== */
        .week-overview {
            margin-top: 34px;
            background: var(--ink-2);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 18px;
        }

        .week-overview h2 {
            margin: 0 0 4px;
            font-size: 15px;
            font-weight: 800;
        }

        .week-overview .sub {
            color: var(--text-dim);
            font-size: 12.5px;
            margin: 0 0 16px;
        }

        .heat-grid {
            display: grid;
            grid-template-columns: 38px repeat(7, 1fr);
            gap: 4px;
            font-family: 'JetBrains Mono', monospace;
        }

        .heat-grid .col-head {
            font-size: 10.5px;
            color: var(--text-dim);
            text-align: center;
            padding-bottom: 4px;
        }

        .heat-grid .row-head {
            font-size: 10px;
            color: var(--text-dim);
            align-self: center;
        }

        .cell {
            height: 16px;
            border-radius: 4px;
            background: var(--ink-3);
        }

        footer {
            text-align: center;
            color: var(--text-dim);
            font-size: 11.5px;
            margin-top: 34px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: .04em;
        }

        @media (max-width:520px) {
            .row {
                grid-template-columns: 18px 78px 4px 1fr 0px;
            }

            .row .tag {
                display: none;
            }

            .clock-box {
                text-align: left;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>
    <div class="wrap">

        <header>
            <div>
                <h1>Daily Schedule</h1>
            </div>
            <div class="clock-box">
                <div class="clock-time" id="clockTime">--:--:--</div>
                <div class="clock-date" id="clockDate">-</div>
            </div>
        </header>

        <div class="now-strip">
            <div class="now-dot"></div>
            <div>
                <div class="label">Ongoing</div>
                <div class="activity" id="nowActivity">Loading…</div>
            </div>
            <div class="countdown" id="nowCountdown"></div>
        </div>

        <div class="tabs" id="tabs"></div>

        <div class="progress-row">
            <span class="progress-label" id="progressLabel">0 / 0 done</span>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="progress-label" id="progressPct">0%</span>
        </div>

        <div id="panels"></div>

        <div class="legend">
            <div class="item"><span class="dot cat-school"></span>School</div>
            <div class="item"><span class="dot cat-hsk"></span>HSK</div>
            <div class="item"><span class="dot cat-code"></span>Competitive Programming</div>
            <div class="item"><span class="dot cat-project"></span>Project</div>
            <div class="item"><span class="dot cat-life"></span>Daily Routine</div>
        </div>

        <div class="week-overview">
            <h2>This Week's Overview</h2>
            <p class="sub">Each cell represents one activity. Color shows its category.</p>
            <div class="heat-grid" id="heatGrid"></div>
        </div>

        <table>
            <thead>
                <tr id="lesson-table-header"></tr>
            </thead>
        </table>
    </div>

    <script>
        // ===== Data =====
        const Schedule = {
            "Monday": {
                time: ["05:30 - 06:00", "06:00 - 07:00", "07:00 - 15:55", "15:55 - 16:30", "16:30 - 17:30", "17:30 - 18:00", "18:00 - 19:00", "19:00 - 20:30", "20:30 - 21:30"],
                activities: [["Wake Up & Shower", "life"], ["Breakfast & Head to School", "life"], ["School", "school"], ["Home, Shower & Rest", "life"], ["Homework / Review School Material", "school"], ["Dinner", "life"], ["HSK Study", "hsk"], ["Competitive Programming", "code"], ["Project / Reading", "project"]]
            },
            "Tuesday": {
                time: ["05:30 - 06:00", "06:00 - 07:00", "07:00 - 15:55", "15:55 - 16:30", "16:30 - 17:30", "17:30 - 18:00", "18:00 - 19:00", "19:00 - 20:30", "20:30 - 21:30"],
                activities: [["Wake Up & Shower", "life"], ["Breakfast & Head to School", "life"], ["School", "school"], ["Home, Shower & Rest", "life"], ["Homework / Review School Material", "school"], ["Dinner", "life"], ["HSK Study", "hsk"], ["Competitive Programming", "code"], ["Project / Reading", "project"]]
            },
            "Wednesday": {
                time: ["05:30 - 06:00", "06:00 - 07:00", "07:00 - 15:55", "15:55 - 16:30", "16:30 - 17:30", "17:30 - 18:00", "18:00 - 19:00", "19:00 - 20:30", "20:30 - 21:30"],
                activities: [["Wake Up & Shower", "life"], ["Breakfast & Head to School", "life"], ["School", "school"], ["Home, Shower & Rest", "life"], ["Homework / Review School Material", "school"], ["Dinner", "life"], ["HSK Study", "hsk"], ["Competitive Programming", "code"], ["Project / Reading", "project"]]
            },
            "Thursday": {
                time: ["05:30 - 06:00", "06:00 - 07:00", "07:00 - 15:55", "15:55 - 16:30", "16:30 - 17:30", "17:30 - 18:00", "18:00 - 19:00", "19:00 - 20:30", "20:30 - 21:30"],
                activities: [["Wake Up & Shower", "life"], ["Breakfast & Head to School", "life"], ["School", "school"], ["Home, Shower & Rest", "life"], ["Homework / Review School Material", "school"], ["Dinner", "life"], ["HSK Study", "hsk"], ["Competitive Programming", "code"], ["Project / Reading", "project"]]
            },
            "Friday": {
                time: ["05:30 - 06:00", "06:00 - 07:00", "07:00 - 15:55", "15:55 - 16:30", "16:30 - 17:30", "17:30 - 18:00", "18:00 - 19:00", "19:00 - 20:30", "20:30 - 21:30"],
                activities: [["Wake Up & Shower", "life"], ["Breakfast & Head to School", "life"], ["School", "school"], ["Home, Shower & Rest", "life"], ["Homework / Review School Material", "school"], ["Dinner", "life"], ["HSK Study", "hsk"], ["Competitive Programming", "code"], ["Weekly Review / Light Project", "project"]]
            },
            "Saturday": {
                time: ["05:30 - 06:00", "06:00 - 07:00", "07:00 - 08:30", "08:30 - 09:00", "09:00 - 11:00", "11:00 - 12:00", "13:00 - 15:00", "15:00 - 17:00", "19:00 - 21:30"],
                activities: [["Wake Up & Shower", "life"], ["Breakfast", "life"], ["Laundry", "life"], ["Rest", "life"], ["HSK Mock Test", "hsk"], ["Lunch", "life"], ["Competitive Programming", "code"], ["Project Development", "project"], ["Free Time / Reading", "life"]]
            },
            "Sunday": {
                time: ["05:30 - 06:00", "06:00 - 07:00", "07:00 - 09:00", "09:00 - 11:00", "11:00 - 12:00", "13:00 - 15:00", "15:00 - 17:00", "19:00 - 20:30", "20:30 - 21:30"],
                activities: [["Wake Up & Shower", "life"], ["Breakfast", "life"], ["Weekly Planning", "project"], ["Homework", "school"], ["Lunch", "life"], ["Project Development", "project"], ["Exercise / Relax", "life"], ["Prepare for Monday", "life"], ["Reading & Sleep Prep", "life"]]
            }
        };

        const catLabel = { school: "School", hsk: "HSK", code: "Coding", project: "Project", life: "Routine" };
        const dayOrder = Object.keys(Schedule);
        const jsDayIndex = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"]; // matches Date.getDay()

        // completion state kept in memory only (no persistence across reloads)
        const state = {};
        dayOrder.forEach(d => { state[d] = Schedule[d].activities.map(() => false); });

        let activeDay = dayOrder[(new Date().getDay() + 6) % 7]; // default to today (Mon-first)

        function parseRange(range) {
            const [a, b] = range.split(" - ");
            const toMin = t => { const [h, m] = t.split(":").map(Number); return h * 60 + m; };
            return [toMin(a), toMin(b)];
        }

        function buildTabs() {
            const tabs = document.getElementById("tabs");
            const todayName = jsDayIndex[new Date().getDay()];
            tabs.innerHTML = dayOrder.map(d => {
                const isToday = d === todayName;
                return `<button class="tab ${d === activeDay ? 'active' : ''} ${isToday ? 'is-today' : ''}" data-day="${d}">${d.slice(0, 3)}</button>`;
            }).join("");
            tabs.querySelectorAll(".tab").forEach(btn => {
                btn.addEventListener("click", () => { activeDay = btn.dataset.day; renderAll(); });
            });
        }

        function buildPanels() {
            const panels = document.getElementById("panels");
            panels.innerHTML = dayOrder.map(d => {
                const rows = Schedule[d].activities.map(([name, cat], i) => {
                    const time = Schedule[d].time[i];
                    return `
      <div class="row" data-day="${d}" data-idx="${i}">
        <button class="chk" data-day="${d}" data-idx="${i}">✓</button>
        <div class="time">${time}</div>
        <div class="cat-bar cat-${cat}"></div>
        <div class="activity-name">${name}</div>
        <div class="tag">${catLabel[cat]}</div>
      </div>`;
                }).join("");
                return `<div class="day-panel ${d === activeDay ? 'active' : ''}" data-day="${d}">
      <h2 class="day-title">${d}</h2>
      <p class="day-sub">${Schedule[d].activities.length} activities scheduled</p>
      <div class="ledger">${rows}</div>
    </div>`;
            }).join("");

            panels.querySelectorAll(".chk").forEach(btn => {
                btn.addEventListener("click", () => {
                    const d = btn.dataset.day, i = +btn.dataset.idx;
                    state[d][i] = !state[d][i];
                    renderAll();
                });
            });
        }

        function buildHeat() {
            const grid = document.getElementById("heatGrid");
            const maxRows = Math.max(...dayOrder.map(d => Schedule[d].activities.length));
            let html = `<div></div>` + dayOrder.map(d => `<div class="col-head">${d.slice(0, 3)}</div>`).join("");
            for (let r = 0; r < maxRows; r++) {
                html += `<div class="row-head">${r + 1}</div>`;
                dayOrder.forEach(d => {
                    const act = Schedule[d].activities[r];
                    if (!act) { html += `<div class="cell" style="background:transparent;"></div>`; return; }
                    const done = state[d][r];
                    html += `<div class="cell cat-${act[1]}" style="opacity:${done ? 0.35 : 1}"></div>`;
                });
            }
            grid.innerHTML = html;
        }

        function renderProgress() {
            const done = state[activeDay].filter(Boolean).length;
            const total = state[activeDay].length;
            document.getElementById("progressLabel").textContent = `${done} / ${total} done`;
            document.getElementById("progressPct").textContent = `${Math.round(total ? done / total * 100 : 0)}%`;
            document.getElementById("progressFill").style.width = `${total ? done / total * 100 : 0}%`;
        }

        function updateDoneStyles() {
            document.querySelectorAll(".row").forEach(row => {
                const d = row.dataset.day, i = +row.dataset.idx;
                row.classList.toggle("done", !!state[d][i]);
            });
        }

        function createLessonTable() {
            [[]].forEach();
        }

        function updateNow() {
            const now = new Date();
            const todayName = jsDayIndex[now.getDay()];
            const nowMin = now.getHours() * 60 + now.getMinutes();

            document.getElementById("clockTime").textContent = now.toLocaleTimeString('en-US', { hour12: false });
            document.getElementById("clockDate").textContent = now.toLocaleDateString('en-US', { weekday: 'long', day: 'numeric', month: 'long' });

            document.querySelectorAll(".row").forEach(r => r.classList.remove("now-row"));

            const daySchedule = Schedule[todayName];
            if (!daySchedule) {
                document.getElementById("nowActivity").textContent = "No schedule for today";
                document.getElementById("nowCountdown").textContent = "";
                return;
            }
            let found = false;
            for (let i = 0; i < daySchedule.time.length; i++) {
                const [start, end] = parseRange(daySchedule.time[i]);
                if (nowMin >= start && nowMin < end) {
                    found = true;
                    document.getElementById("nowActivity").textContent = `${daySchedule.activities[i][0]} · ${todayName}`;
                    const remain = end - nowMin;
                    const h = Math.floor(remain / 60), m = remain % 60;
                    document.getElementById("nowCountdown").innerHTML = `ends in <b>${h > 0 ? h + 'h ' : ''}${m}m</b>`;
                    document.querySelectorAll(`.row[data-day="${todayName}"][data-idx="${i}"]`).forEach(r => r.classList.add("now-row"));
                    break;
                }
            }
            if (!found) {
                document.getElementById("nowActivity").textContent = `Free time · ${todayName}`;
                document.getElementById("nowCountdown").textContent = "";
            }
        }

        function renderAll() {
            document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.day === activeDay));
            document.querySelectorAll(".day-panel").forEach(p => p.classList.toggle("active", p.dataset.day === activeDay));
            updateDoneStyles();
            renderProgress();
            buildHeat();
        }

        buildTabs();
        buildPanels();
        renderAll();
        updateNow();
        setInterval(updateNow, 1000);
    </script>
</body>

</html>
